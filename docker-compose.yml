services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weatherapp
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather123

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weatherapp"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
