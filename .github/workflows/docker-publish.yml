name: Docker Build and Publish

on:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "backend/**"
  workflow_dispatch:

env:
  IMAGE_NAME: gabrielmqc/desafio-csharp

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependências
        working-directory: ./backend
        run: dotnet restore

      - name: Build da solução
        working-directory: ./backend
        run: dotnet build --configuration Release --no-restore

      - name: Executar testes unitários
        working-directory: ./backend
        run: dotnet test --configuration Release --no-build --verbosity normal

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extrair metadados para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value=${{ github.run_number }}
            type=ref,event=branch

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/WeatherApp.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_CONFIGURATION=Release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo da implantação
        if: success()
        run: |
          echo "### Pipeline concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "**Imagem:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** Passed ✓" >> $GITHUB_STEP_SUMMARY
